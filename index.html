<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Gymkhana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f4f4f9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }
        h1 { margin-top: 0; color: var(--primary-color); }
        .schedule-card {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .upload-section { margin-top: 20px; }
        select, input[type="file"], button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled { background-color: #ccc; }
        #status { font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 id="team-display">Loading Team...</h2>

    <div class="container">
        <div class="schedule-card">
            <h3 style="margin-top: 0;">Current Objective</h3>
            <p id="current-time">Time: 00:00</p>
            <p id="objective-text">Calculating next landmark...</p>
        </div>

        <div class="upload-section">
            <h3>Submit Photo</h3>
            <select id="task-type">
                <option value="Landmark">Main Landmark</option>
                <option value="Side Quest">Side Quest</option>
            </select>
            
            <input type="file" id="photo-input" accept="image/*" capture="environment">
            
            <button id="submit-btn" onclick="uploadPhoto()">Upload & Submit</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
    // 1. READ TEAM FROM URL & SET THEME (Moved to the top!)
    const urlParams = new URLSearchParams(window.location.search);
    const teamName = urlParams.get('team') || 'Unknown Team';
    document.getElementById('team-display').innerText = `Team: ${teamName}`;

    // Apply color to the h2 element dynamically
    document.getElementById('team-display').style.color = 'var(--primary-color)';

    if(teamName.toLowerCase() === 'red') { document.documentElement.style.setProperty('--primary-color', '#d32f2f'); }
    if(teamName.toLowerCase() === 'blue') { document.documentElement.style.setProperty('--primary-color', '#1976d2'); }
    if(teamName.toLowerCase() === 'green') { document.documentElement.style.setProperty('--primary-color', '#388e3c'); }

    // 2. SCHEDULE LOGIC
    const schedule = [
        { start: "14:00", end: "15:30", landmark: "The Old Fountain", instructions: "Find the hidden symbol." },
        { start: "15:30", end: "16:30", landmark: "Town Hall Square", instructions: "Group photo with a local." },
        { start: "16:30", end: "18:00", landmark: "The Bridge", instructions: "Final checkpoint!" }
    ];

    function updateSchedule() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const currentTimeStr = `${hours}:${minutes}`;
        
        document.getElementById('current-time').innerText = `Current Time: ${currentTimeStr}`;

        let currentObjective = "Free time! Check back later or do Side Quests.";
        for (const slot of schedule) {
            if (currentTimeStr >= slot.start && currentTimeStr < slot.end) {
                currentObjective = `<strong>${slot.landmark}</strong><br>${slot.instructions}<br><em>(Ends at ${slot.end})</em>`;
                break;
            }
        }
        document.getElementById('objective-text').innerHTML = currentObjective;
    }

    updateSchedule();
    setInterval(updateSchedule, 30000);

    // 3. SET UP SUPABASE

        const SUPABASE_URL = 'https://ryhyimknhuhrhtxcqxwy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5aHlpbWtuaHVocmh0eGNxeHd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNDM1MjIsImV4cCI6MjA5NjkxOTUyMn0.JArfyRBfbjJMVslhHjAhjiBLXbG6eQCfSVAFDtiMK1E';
    
    // We only create the client inside the upload function so it doesn't crash the page on load
    async function uploadPhoto() {
        if (teamName === 'Unknown Team') {
            alert("No team detected! Make sure you are using your team's specific link.");
            return;
        }

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const fileInput = document.getElementById('photo-input');
        const taskType = document.getElementById('task-type').value;
        const statusText = document.getElementById('status');
        const submitBtn = document.getElementById('submit-btn');

        if (!fileInput.files || fileInput.files.length === 0) {
            alert("Please select a photo first!");
            return;
        }

        const file = fileInput.files[0];
        const fileExt = file.name.split('.').pop();
        const fileName = `${teamName}_${taskType.replace(/\s+/g, '')}_${Date.now()}.${fileExt}`;

        submitBtn.disabled = true;
        statusText.innerText = "Uploading photo... Please wait.";
        statusText.style.color = "orange";

        try {
            const { data: storageData, error: storageError } = await supabase.storage
                .from('gymkhana-photos')
                .upload(fileName, file);

            if (storageError) throw storageError;

            const { data: publicUrlData } = supabase.storage
                .from('gymkhana-photos')
                .getPublicUrl(fileName);
            
            const photoUrl = publicUrlData.publicUrl;

            const { error: dbError } = await supabase
                .from('submissions')
                .insert([{ team: teamName, type: taskType, photo_url: photoUrl }]);

            if (dbError) throw dbError;

            statusText.innerText = "Success! Photo submitted.";
            statusText.style.color = "green";
            fileInput.value = ""; 

        } catch (error) {
            console.error(error);
            statusText.innerText = "Error uploading. Check your Supabase keys!";
            statusText.style.color = "red";
        } finally {
            submitBtn.disabled = false;
        }
    }
</script>
  
</body>
</html>
